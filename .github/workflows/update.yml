name: Update Smart Money Data

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      # Секреты для Telegram-алертов. Задай их в
      # Settings → Secrets and variables → Actions → New repository secret.
      # Если не заданы — скрипты просто не шлют уведомления (workflow не падает).
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch 13F data from SEC EDGAR
        run: python3 scripts/fetch_13f.py

      - name: Fetch insider Form 4 trades from SEC EDGAR
        run: python3 scripts/fetch_form4.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/funds.json docs/data/insiders.json
          if git diff --staged --quiet; then
            echo "No changes — data unchanged."
          else
            git commit -m "chore: update smart money data $(date -u +%Y-%m-%d)"
            git push
          fi

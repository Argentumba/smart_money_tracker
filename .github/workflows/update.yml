name: Update 13F Data

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch 13F data from SEC EDGAR
        run: python3 scripts/fetch_13f.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/funds.json
          if git diff --staged --quiet; then
            echo "No changes — 13F data unchanged."
          else
            git commit -m "chore: update 13F data $(date -u +%Y-%m-%d)"
            git push
          fi
